name: Stage npm release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Exact package version to stage
        required: true
        type: string
      dist_tag:
        description: npm dist-tag
        required: true
        default: next
        type: choice
        options:
          - next
          - latest
      production_release_run_url:
        description: Successful US production promotion that completed this exact DE-to-US contract release.
        required: true
        type: string
      confirm_ga:
        description: Confirm the separately approved GA gate; required only for latest.
        required: true
        type: boolean
        default: false

permissions:
  contents: read
  id-token: write

concurrency:
  group: npm-release
  cancel-in-progress: false

jobs:
  stage:
    name: Verify and stage packages
    if: github.repository == 'TeamGrid/developer-platform' && github.ref_type == 'tag'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: npm
    defaults:
      run:
        working-directory: developer-platform
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Node.js and npm registry
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "24"
          registry-url: https://registry.npmjs.org
          package-manager-cache: false

      - name: Install npm 11.18.0
        run: npm install --global npm@11.18.0

      - name: Install dependencies
        run: npm ci

      - name: Verify source and package artifacts
        run: npm run verify

      - name: Audit production dependencies
        run: npm audit --omit=dev --audit-level=high

      - name: Verify immutable runtime promotion evidence
        env:
          GH_TOKEN: ${{ secrets.TEAMGRID_REPOSITORY_TOKEN }}
          PRODUCTION_RELEASE_RUN_URL: ${{ inputs.production_release_run_url }}
        run: |
          set -euo pipefail
          [[ "$PRODUCTION_RELEASE_RUN_URL" =~ ^https://github\.com/TeamGrid/teamgrid/actions/runs/[0-9]+$ ]] || {
            echo "production_release_run_url must be a TeamGrid/teamgrid Actions run URL." >&2
            exit 1
          }
          run_id="${PRODUCTION_RELEASE_RUN_URL##*/}"
          evidence_dir="$RUNNER_TEMP/teamgrid-production-release"
          mkdir -p "$evidence_dir/us" "$evidence_dir/de"
          us_run_path="$evidence_dir/us-run.json"
          gh api "repos/TeamGrid/teamgrid/actions/runs/$run_id" > "$us_run_path"
          gh run download "$run_id" --repo TeamGrid/teamgrid \
            --name developer-platform-us-promotion-evidence --dir "$evidence_dir/us"
          us_evidence_path="$evidence_dir/us/developer-platform-us-promotion-evidence.json"
          [[ -f "$us_evidence_path" ]] || {
            echo "The US production run has no immutable promotion evidence." >&2
            exit 1
          }

          de_run_id="$(jq -r '.sourceDeCanaryRunId // empty' "$us_evidence_path")"
          [[ "$de_run_id" =~ ^[0-9]+$ ]] || {
            echo "The US promotion evidence has no exact DE canary run id." >&2
            exit 1
          }
          de_run_path="$evidence_dir/de-run.json"
          gh api "repos/TeamGrid/teamgrid/actions/runs/$de_run_id" > "$de_run_path"
          gh run download "$de_run_id" --repo TeamGrid/teamgrid \
            --pattern 'teamgrid-multi-cell-release-*' --dir "$evidence_dir/de"
          mapfile -t de_evidence_paths < <(
            find "$evidence_dir/de" -type f -name promotion-evidence.json -print
          )
          [[ "${#de_evidence_paths[@]}" -eq 1 ]] || {
            echo "The DE canary run must contain exactly one promotion evidence document." >&2
            exit 1
          }

          manifest_sha256="$(sha256sum ../openapi/developer-platform-manifest.json | awk '{print $1}')"
          DE_CANARY_EVIDENCE_PATH="${de_evidence_paths[0]}" \
          DE_CANARY_RUN_PATH="$de_run_path" \
          EXPECTED_DEVELOPER_PLATFORM_SHA="$GITHUB_SHA" \
          EXPECTED_MANIFEST_SHA256="$manifest_sha256" \
          PRODUCTION_RELEASE_RUN_URL="$PRODUCTION_RELEASE_RUN_URL" \
          US_PROMOTION_EVIDENCE_PATH="$us_evidence_path" \
          US_PROMOTION_RUN_PATH="$us_run_path" \
            node scripts/verify-production-release-evidence.mjs

      - name: Validate release
        env:
          RELEASE_CONFIRM_GA: ${{ inputs.confirm_ga }}
          RELEASE_VERSION: ${{ inputs.version }}
          RELEASE_DIST_TAG: ${{ inputs.dist_tag }}
        run: node scripts/validate-release.mjs --mode stage

      - name: Stage API client
        working-directory: developer-platform/packages/api-client
        run: npm stage publish --tag "${{ inputs.dist_tag }}"

      - name: Stage CLI
        working-directory: developer-platform/packages/cli
        run: npm stage publish --tag "${{ inputs.dist_tag }}"

      - name: Stage MCP server
        working-directory: developer-platform/packages/mcp-server
        run: npm stage publish --tag "${{ inputs.dist_tag }}"
