name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Verify packages (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        node-version:
          - "22.14.0"
          - "24"
    defaults:
      run:
        working-directory: developer-platform
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
          cache-dependency-path: developer-platform/package-lock.json

      - name: Install npm 11.18.0
        run: npm install --global npm@11.18.0

      - name: Install dependencies
        run: npm ci

      - name: Verify source and package artifacts
        run: npm run verify

      - name: Audit production dependencies
        if: matrix.node-version == '24'
        run: npm audit --omit=dev --audit-level=high
