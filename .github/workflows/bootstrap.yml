name: Bootstrap npm packages

on:
  workflow_dispatch:
    inputs:
      version:
        description: Exact package version to publish
        required: true
        type: string
      dist_tag:
        description: npm dist-tag
        required: true
        default: next
        type: choice
        options:
          - next

permissions:
  contents: read
  id-token: write

concurrency:
  group: npm-bootstrap
  cancel-in-progress: false

jobs:
  publish:
    name: Publish initial package versions
    if: github.repository == 'TeamGrid/developer-platform' && github.ref_type == 'tag'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: npm-bootstrap
    defaults:
      run:
        working-directory: developer-platform
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Node.js and npm registry
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "24"
          registry-url: https://registry.npmjs.org
          package-manager-cache: false

      - name: Install npm 11.18.0
        run: npm install --global npm@11.18.0

      - name: Install dependencies
        run: npm ci

      - name: Verify source and package artifacts
        run: npm run verify

      - name: Audit production dependencies
        run: npm audit --omit=dev --audit-level=high

      - name: Validate one-time bootstrap release
        env:
          RELEASE_VERSION: ${{ inputs.version }}
          RELEASE_DIST_TAG: ${{ inputs.dist_tag }}
        run: node scripts/validate-release.mjs --mode bootstrap

      - name: Publish API client
        working-directory: developer-platform/packages/api-client
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_BOOTSTRAP_TOKEN }}
        run: npm publish --access public --tag "${{ inputs.dist_tag }}"

      - name: Publish CLI
        working-directory: developer-platform/packages/cli
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_BOOTSTRAP_TOKEN }}
        run: npm publish --access public --tag "${{ inputs.dist_tag }}"

      - name: Publish MCP server
        working-directory: developer-platform/packages/mcp-server
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_BOOTSTRAP_TOKEN }}
        run: npm publish --access public --tag "${{ inputs.dist_tag }}"
